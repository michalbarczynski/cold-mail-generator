<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Cold Mail Generator</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 0.9rem; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; }
    button { background: #1a1a1a; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:disabled { background: #999; cursor: not-allowed; }
    #output { margin-top: 32px; white-space: pre-wrap; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; display: none; }
  </style>
</head>
<body>

<h1>Cold Mail Generator</h1>

<label>Nazwa firmy</label>
<input type="text" id="company" placeholder="np. Acme Sp. z o.o." />

<label>Branża</label>
<input type="text" id="industry" placeholder="np. logistyka, e-commerce, IT" />

<label>Kraj / rynek docelowy</label>
<input type="text" id="country" placeholder="np. Polska, Niemcy" />

<label>Opis firmy <span style="font-weight:normal;color:#888">(wklej fragment ze strony "O nas" lub LinkedIn)</span></label>
<textarea id="description" rows="4" placeholder="np. Firma XYZ specjalizuje się w transporcie chłodniczym na rynku europejskim. Obsługuje klientów z branży spożywczej i farmaceutycznej..."></textarea>

<label>Kim jesteś i co oferujesz <span style="font-weight:normal;color:#888">(1-2 zdania)</span></label>
<textarea id="sender" rows="2" placeholder="np. Jestem freelancerem specjalizującym się w automatyzacjach AI dla e-commerce. Pomagam sklepom zautomatyzować obsługę klienta i lead gen."></textarea>

<label>Klucz API Gemini</label>
<input type="password" id="apikey" placeholder="Wklej swój klucz tutaj" />

<button id="btn" onclick="generate()">Generuj maile</button>

<div id="output"></div>

<script>
async function generate() {
  const company = document.getElementById('company').value.trim();
  const industry = document.getElementById('industry').value.trim();
  const country = document.getElementById('country').value.trim();
  const apiKey = document.getElementById('apikey').value.trim();
  const output = document.getElementById('output');
  const btn = document.getElementById('btn');
  const description = document.getElementById('description').value.trim();
  const sender = document.getElementById('sender').value.trim();

  if (!company || !industry || !apiKey) {
    alert('Wypełnij nazwę firmy, branżę i klucz API.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Generuję...';
  output.style.display = 'none';

  const prompt = `Jesteś ekspertem od cold outreach B2B.

Firma docelowa: ${company}
Branża: ${industry}
Kraj/rynek: ${country || 'nieokreślony'}
${sender ? `\nNadawca / oferta:\n${sender}` : ''}

Wygeneruj 3 warianty cold maila do tej firmy. Każdy wariant powinien mieć inny styl:
- Wariant 1: formalny i profesjonalny
- Wariant 2: bezpośredni i konkretny  
- Wariant 3: kreatywny z nieoczywistym otwarciem

Każdy mail powinien mieć: temat, treść (max 5 zdań), i wyraźne CTA. Maile mają brzmieć jak napisane przez człowieka, nie przez AI.`;

  try {
    const response = await fetch(
      'https://api.groq.com/openai/v1/chat/completions',
      {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'user', content: prompt }]
        })
      }
    );

    const data = await response.json();
    const text = data.choices?.[0]?.message?.content;

    if (text) {
      output.textContent = text;
      output.style.display = 'block';
    } else {
      output.textContent = 'Błąd: ' + JSON.stringify(data);
      output.style.display = 'block';
    }
  } catch (err) {
    output.textContent = 'Błąd połączenia: ' + err.message;
    output.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Generuj maile';
}
</script>

</body>
</html>
