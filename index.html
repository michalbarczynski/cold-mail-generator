<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cold Mail Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #d4f57a;
      --accent-dim: #a8c45a;
      --text: #f0f0f0;
      --text-muted: #888;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header {
      margin-bottom: 40px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    label span { text-transform: none; font-weight: 400; color: #555; }

    input, textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      resize: vertical;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    input::placeholder, textarea::placeholder { color: #444; }

    .api-section {
      margin-top: 16px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .api-section label {
      white-space: nowrap;
      margin: 0;
    }

    .api-section input {
      flex: 1;
      margin: 0;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }

    .generate-btn {
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      background: var(--accent);
      color: #0f0f0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: -0.01em;
    }

    .generate-btn:hover { background: var(--accent-dim); }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

    .loading {
      display: none;
      margin-top: 32px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    .pain-points-box {
      display: none;
      margin-top: 32px;
      padding: 16px 20px;
      background: #1a1f0f;
      border: 1px solid #3a4a1a;
      border-radius: var(--radius);
    }

    .pain-points-box h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 8px;
      font-family: 'DM Mono', monospace;
    }

    .pain-points-box p {
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.6;
    }

    .results {
      display: none;
      margin-top: 24px;
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .results-header h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    .mail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.3s ease both;
    }

    .mail-card:nth-child(2) { animation-delay: 0.05s; }
    .mail-card:nth-child(3) { animation-delay: 0.1s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .variant-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .copy-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

    .card-subject {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .subject-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #555;
      margin-bottom: 4px;
      font-family: 'DM Mono', monospace;
    }

    .subject-text {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
    }

    .card-body {
      padding: 16px;
      font-size: 0.9rem;
      line-height: 1.7;
      color: #ccc;
      white-space: pre-wrap;
    }

    .error-box {
      display: none;
      margin-top: 24px;
      padding: 16px;
      background: #1f0f0f;
      border: 1px solid #4a1a1a;
      border-radius: var(--radius);
      color: #e88;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
    }

    @media (max-width: 580px) {
      .form-grid { grid-template-columns: 1fr; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">B2B OUTREACH TOOL</div>
    <h1>Cold Mail <span>Generator</span></h1>
    <p class="subtitle">Spersonalizowane cold maile B2B na podstawie profilu firmy</p>
  </header>

  <div class="form-grid">
    <div class="form-group">
      <label>Nazwa firmy</label>
      <input type="text" id="company" placeholder="np. Acme Sp. z o.o." />
    </div>
    <div class="form-group">
      <label>Branża</label>
      <input type="text" id="industry" placeholder="np. logistyka, e-commerce" />
    </div>
    <div class="form-group">
      <label>Kraj / rynek</label>
      <input type="text" id="country" placeholder="np. Polska, Niemcy" />
    </div>
    <div class="form-group full">
      <label>Opis firmy <span>(fragment ze strony "O nas" lub LinkedIn)</span></label>
      <textarea id="description" rows="3" placeholder="np. Firma XYZ specjalizuje się w transporcie chłodniczym na rynku europejskim..."></textarea>
    </div>
    <div class="form-group full">
      <label>Kim jesteś i co oferujesz <span>(1-2 zdania)</span></label>
      <textarea id="sender" rows="2" placeholder="np. Jestem freelancerem specjalizującym się w automatyzacjach AI. Pomagam firmom zautomatyzować lead gen i obsługę klienta."></textarea>
    </div>
  </div>

  <div class="api-section">
    <label>GROQ API KEY</label>
    <input type="password" id="apikey" placeholder="gsk_..." />
  </div>

  <button class="generate-btn" id="btn" onclick="generate()">Generuj maile →</button>

  <div class="loading" id="loading">
    <span class="dots">Analizuję firmę i generuję maile</span>
  </div>

  <div class="pain-points-box" id="painBox">
    <h3>Zidentyfikowane pain pointy</h3>
    <p id="painText"></p>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="results" id="results"></div>

</div>

<script>
async function generate() {
  const company = document.getElementById('company').value.trim();
  const industry = document.getElementById('industry').value.trim();
  const country = document.getElementById('country').value.trim();
  const description = document.getElementById('description').value.trim();
  const sender = document.getElementById('sender').value.trim();
  const apiKey = document.getElementById('apikey').value.trim();

  const btn = document.getElementById('btn');
  const loading = document.getElementById('loading');
  const results = document.getElementById('results');
  const errorBox = document.getElementById('errorBox');
  const painBox = document.getElementById('painBox');

  if (!company || !industry || !apiKey) {
    alert('Wypełnij nazwę firmy, branżę i klucz API.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Generuję...';
  loading.style.display = 'block';
  results.style.display = 'none';
  errorBox.style.display = 'none';
  painBox.style.display = 'none';

  const prompt = `Jesteś ekspertem od cold outreach B2B.

Firma docelowa: ${company}
Branża: ${industry}
Kraj/rynek: ${country || 'nieokreślony'}
${description ? `\nOpis firmy:\n${description}` : ''}
${sender ? `\nNadawca / oferta:\n${sender}` : ''}

Twoje zadanie: na podstawie profilu firmy zidentyfikuj jej pain pointy i napisz 3 spersonalizowane cold maile.

Odpowiedz WYŁĄCZNIE w formacie JSON (bez markdown, bez komentarzy):
{
  "pain_points": "2-3 zdania o zidentyfikowanych pain pointach tej firmy",
  "emails": [
    {
      "variant": "Formalny",
      "subject": "temat maila",
      "body": "treść maila (max 5 zdań + CTA)"
    },
    {
      "variant": "Bezpośredni",
      "subject": "temat maila",
      "body": "treść maila (max 5 zdań + CTA)"
    },
    {
      "variant": "Kreatywny",
      "subject": "temat maila",
      "body": "treść maila (max 5 zdań + CTA)"
    }
  ]
}

Maile mają być konkretne, odnosić się do tej firmy, brzmieć jak napisane przez człowieka.`;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.7
      })
    });

    const data = await response.json();
    const text = data.choices?.[0]?.message?.content;

    if (!text) {
      throw new Error(JSON.stringify(data));
    }

    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (parsed.pain_points) {
      document.getElementById('painText').textContent = parsed.pain_points;
      painBox.style.display = 'block';
    }

    results.innerHTML = '';
    parsed.emails.forEach((email, i) => {
      const card = document.createElement('div');
      card.className = 'mail-card';
      card.innerHTML = `
        <div class="card-header">
          <span class="variant-label">Wariant ${i + 1} — ${email.variant}</span>
          <button class="copy-btn" onclick="copyMail(this, ${i})">Kopiuj</button>
        </div>
        <div class="card-subject">
          <div class="subject-label">Temat</div>
          <div class="subject-text">${email.subject}</div>
        </div>
        <div class="card-body">${email.body}</div>
      `;
      card.dataset.full = `Temat: ${email.subject}\n\n${email.body}`;
      results.appendChild(card);
    });

    results.style.display = 'flex';

  } catch (err) {
    errorBox.textContent = 'Błąd: ' + err.message;
    errorBox.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = 'Generuj maile →';
  loading.style.display = 'none';
}

function copyMail(btn, index) {
  const cards = document.querySelectorAll('.mail-card');
  const text = cards[index].dataset.full;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Skopiowano ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Kopiuj';
      btn.classList.remove('copied');
    }, 2000);
  });
}
</script>

</body>
</html>
