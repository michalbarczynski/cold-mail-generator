<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadPilot — AI Outreach Copilot</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #d4f57a;
      --accent-dim: #a8c45a;
      --text: #f0f0f0;
      --text-muted: #888;
      --radius: 10px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    .container { max-width: 760px; margin: 0 auto; }

    header { margin-bottom: 36px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.03em; }
    h1 span { color: var(--accent); }
    .subtitle { margin-top: 8px; color: var(--text-muted); font-size: 0.9rem; }

    /* STEPPER */
    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .step {
      flex: 1;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-right: 1px solid var(--border);
      transition: background 0.3s;
    }

    .step:last-child { border-right: none; }

    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: all 0.3s;
    }

    .step-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.3s;
    }

    .step.active { background: #1a1f0f; }
    .step.active .step-num { background: var(--accent); border-color: var(--accent); color: #0f0f0f; font-weight: 600; }
    .step.active .step-label { color: var(--accent); }
    .step.done .step-num { background: #2a3a1a; border-color: var(--accent-dim); color: var(--accent); }
    .step.done .step-label { color: #6a8a3a; }

    /* FORM */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    label span { text-transform: none; font-weight: 400; color: #555; }

    input, textarea, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      transition: border-color 0.2s;
      resize: vertical;
      width: 100%;
    }

    select { cursor: pointer; }
    select option { background: var(--surface2); }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: #444; }

    .api-row {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .api-row label { white-space: nowrap; margin: 0; }
    .api-row input { flex: 1; font-family: 'DM Mono', monospace; font-size: 0.82rem; }

    .generate-btn {
      width: 100%;
      margin-top: 16px;
      padding: 15px;
      background: var(--accent);
      color: #0f0f0f;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: -0.01em;
    }

    .generate-btn:hover { background: var(--accent-dim); }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; transform: none; }

    /* STATUS */
    .status-bar {
      display: none;
      margin-top: 24px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      align-items: center;
      gap: 12px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
    }

    /* INSIGHTS */
    .insights-panel {
      display: none;
      margin-top: 24px;
      padding: 18px 20px;
      background: #141a0a;
      border: 1px solid #2a3a12;
      border-radius: var(--radius);
      animation: fadeUp 0.3s ease;
    }

    .insights-panel h3 {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .insights-grid { display: grid; grid-template-columns: auto 1fr; gap: 6px 14px; }
    .insight-key { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
    .insight-val { font-size: 0.85rem; color: #ccc; line-height: 1.5; }

    .icp-score {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .score-bar {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      width: 80px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    /* RESULTS */
    .results { display: none; margin-top: 20px; }

    .results-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .sequence { display: flex; flex-direction: column; gap: 12px; }

    .mail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.3s ease both;
    }

    .mail-card:nth-child(2) { animation-delay: 0.07s; }
    .mail-card:nth-child(3) { animation-delay: 0.14s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .card-meta { display: flex; align-items: center; gap: 10px; }

    .seq-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 3px 8px;
      border-radius: 4px;
      background: #1a1f0f;
      border: 1px solid #3a4a1a;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .timing-hint {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    .copy-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

    .card-subject {
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
    }

    .subject-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #555;
      margin-bottom: 3px;
      font-family: 'DM Mono', monospace;
    }

    .subject-text { font-size: 0.92rem; font-weight: 500; }

    .card-body {
      padding: 14px;
      font-size: 0.88rem;
      line-height: 1.75;
      color: #bbb;
      white-space: pre-wrap;
    }

    .error-box {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      background: #1f0f0f;
      border: 1px solid #4a1a1a;
      border-radius: var(--radius);
      color: #e88;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      line-height: 1.5;
    }

    @media (max-width: 560px) {
      .form-grid { grid-template-columns: 1fr; }
      h1 { font-size: 1.5rem; }
      .stepper { flex-direction: column; }
      .step { border-right: none; border-bottom: 1px solid var(--border); }
      .step:last-child { border-bottom: none; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">AI OUTREACH COPILOT</div>
    <h1>Lead<span>Pilot</span></h1>
    <p class="subtitle">Analizuje firmę, wykrywa pain pointy i generuje spersonalizowaną sekwencję outreach</p>
  </header>

  <!-- STEPPER -->
  <div class="stepper">
    <div class="step" id="step1">
      <div class="step-num">1</div>
      <div class="step-label">Research</div>
    </div>
    <div class="step" id="step2">
      <div class="step-num">2</div>
      <div class="step-label">Analyze</div>
    </div>
    <div class="step" id="step3">
      <div class="step-num">3</div>
      <div class="step-label">Generate</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-grid">
    <div class="form-group">
      <label>Nazwa firmy</label>
      <input type="text" id="company" placeholder="np. Acme Sp. z o.o." />
    </div>
    <div class="form-group">
      <label>Branża</label>
      <input type="text" id="industry" placeholder="np. logistyka, e-commerce" />
    </div>
    <div class="form-group">
      <label>Kraj / rynek</label>
      <input type="text" id="country" placeholder="np. Polska, Niemcy" />
    </div>
    <div class="form-group">
      <label>Target persona</label>
      <select id="persona">
        <option value="CEO/Founder">CEO / Founder</option>
        <option value="Head of Sales">Head of Sales</option>
        <option value="CMO/Marketing">CMO / Marketing</option>
        <option value="HR/People Ops">HR / People Ops</option>
        <option value="Operations Manager">Operations Manager</option>
        <option value="CTO">CTO</option>
      </select>
    </div>
    <div class="form-group full">
      <label>Opis firmy <span>(fragment ze strony "O nas" lub LinkedIn)</span></label>
      <textarea id="description" rows="3" placeholder="np. Firma XYZ specjalizuje się w transporcie chłodniczym na rynku europejskim..."></textarea>
    </div>
    <div class="form-group">
      <label>Kim jesteś i co oferujesz</label>
      <textarea id="sender" rows="2" placeholder="np. Freelancer specjalizujący się w automatyzacjach AI dla e-commerce."></textarea>
    </div>
    <div class="form-group">
      <label>Cel outreachu</label>
      <select id="goal">
        <option value="umówienie 15-minutowej rozmowy">15-min discovery call</option>
        <option value="przedstawienie oferty">Przedstawienie oferty</option>
        <option value="zaproszenie na demo">Demo produktu</option>
        <option value="nawiązanie partnerstwa">Partnerstwo</option>
      </select>
    </div>
  </div>

  <div class="api-row">
    <label>GROQ API</label>
    <input type="password" id="apikey" placeholder="gsk_..." />
  </div>

  <button class="generate-btn" id="btn" onclick="generate()">Uruchom analizę →</button>

  <!-- STATUS -->
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <div class="status-text" id="statusText">Inicjalizuję...</div>
  </div>

  <!-- INSIGHTS -->
  <div class="insights-panel" id="insightsPanel">
    <h3>Outreach Insights</h3>
    <div class="insights-grid" id="insightsGrid"></div>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results">
    <div class="results-label">Sekwencja outreach</div>
    <div class="sequence" id="sequence"></div>
  </div>

  <div class="error-box" id="errorBox"></div>

</div>

<script>
const STEPS = ['step1', 'step2', 'step3'];

function setStep(active) {
  STEPS.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'step';
    if (i < active) el.classList.add('done');
    else if (i === active) el.classList.add('active');
  });
}

function setStatus(text) {
  document.getElementById('statusText').textContent = text;
}

async function generate() {
  const company = document.getElementById('company').value.trim();
  const industry = document.getElementById('industry').value.trim();
  const country = document.getElementById('country').value.trim();
  const description = document.getElementById('description').value.trim();
  const sender = document.getElementById('sender').value.trim();
  const persona = document.getElementById('persona').value;
  const goal = document.getElementById('goal').value;
  const apiKey = document.getElementById('apikey').value.trim();

  if (!company || !industry || !apiKey) {
    alert('Wypełnij nazwę firmy, branżę i klucz API.');
    return;
  }

  const btn = document.getElementById('btn');
  const statusBar = document.getElementById('statusBar');
  const insightsPanel = document.getElementById('insightsPanel');
  const results = document.getElementById('results');
  const errorBox = document.getElementById('errorBox');

  btn.disabled = true;
  btn.textContent = 'Analizuję...';
  statusBar.style.display = 'flex';
  insightsPanel.style.display = 'none';
  results.style.display = 'none';
  errorBox.style.display = 'none';

  // Step 1: Research
  setStep(0);
  setStatus('Analizuję profil firmy...');
  await sleep(800);

  // Step 2: Analyze
  setStep(1);
  setStatus('Wykrywam pain pointy i kąt personalizacji...');
  await sleep(700);

  // Step 3: Generate
  setStep(2);
  setStatus('Generuję sekwencję outreach...');

  const prompt = `Jesteś ekspertem od cold outreach B2B i lead generation.

Firma docelowa: ${company}
Branża: ${industry}
Kraj/rynek: ${country || 'nieokreślony'}
Target persona: ${persona}
Cel outreachu: ${goal}
${description ? `\nOpis firmy:\n${description}` : ''}
${sender ? `\nNadawca / oferta:\n${sender}` : ''}

Twoje zadanie: przeanalizuj firmę i wygeneruj kompletną sekwencję outreach.

Odpowiedz WYŁĄCZNIE w formacie JSON (bez markdown, bez komentarzy, bez backtick):
{
  "icp_score": 7,
  "icp_reason": "jedno zdanie dlaczego taki score",
  "pain_points": "2-3 konkretne pain pointy tej firmy w tej branży",
  "outreach_angle": "jedno zdanie - najlepszy kąt personalizacji",
  "cta_suggestion": "konkretna sugestia CTA dopasowana do persony i celu",
  "emails": [
    {
      "sequence": "Initial",
      "timing": "Dzień 1",
      "subject": "temat maila",
      "body": "treść maila — konkretna, ludzka, max 5 zdań + CTA. Odwołuje się do pain pointów firmy."
    },
    {
      "sequence": "Follow-up #1",
      "timing": "Dzień 4",
      "subject": "temat follow-up",
      "body": "krótszy follow-up, inny kąt, nie powtarza initial. Max 3 zdania + CTA."
    },
    {
      "sequence": "Follow-up #2",
      "timing": "Dzień 10",
      "subject": "temat ostatniego follow-up",
      "body": "ostatni bump — bardzo krótki, bezpośredni, z humorem lub otwartym pytaniem. Max 2 zdania."
    }
  ]
}`;

  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.75
      })
    });

    const data = await response.json();
    const text = data.choices?.[0]?.message?.content;
    if (!text) throw new Error(JSON.stringify(data));

    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Show insights
    const score = parsed.icp_score || 0;
    const pct = (score / 10) * 100;
    document.getElementById('insightsGrid').innerHTML = `
      <div class="insight-key">ICP Fit</div>
      <div class="insight-val">
        <div class="icp-score">
          <strong style="color:var(--accent)">${score}/10</strong>
          <div class="score-bar"><div class="score-fill" style="width:${pct}%"></div></div>
          <span style="font-size:0.78rem;color:var(--text-muted)">${parsed.icp_reason || ''}</span>
        </div>
      </div>
      <div class="insight-key">Pain points</div>
      <div class="insight-val">${parsed.pain_points || '-'}</div>
      <div class="insight-key">Kąt outreach</div>
      <div class="insight-val">${parsed.outreach_angle || '-'}</div>
      <div class="insight-key">CTA</div>
      <div class="insight-val">${parsed.cta_suggestion || '-'}</div>
    `;
    insightsPanel.style.display = 'block';

    // Show emails
    const seq = document.getElementById('sequence');
    seq.innerHTML = '';
    parsed.emails.forEach((email, i) => {
      const card = document.createElement('div');
      card.className = 'mail-card';
      card.dataset.full = `Temat: ${email.subject}\n\n${email.body}`;
      card.innerHTML = `
        <div class="card-header">
          <div class="card-meta">
            <span class="seq-badge">${email.sequence}</span>
            <span class="timing-hint">${email.timing}</span>
          </div>
          <button class="copy-btn" onclick="copyCard(this, ${i})">Kopiuj</button>
        </div>
        <div class="card-subject">
          <div class="subject-label">Temat</div>
          <div class="subject-text">${email.subject}</div>
        </div>
        <div class="card-body">${email.body}</div>
      `;
      seq.appendChild(card);
    });

    results.style.display = 'block';
    setStep(3);

  } catch (err) {
    errorBox.textContent = 'Błąd: ' + err.message;
    errorBox.style.display = 'block';
    STEPS.forEach(id => document.getElementById(id).className = 'step');
  }

  btn.disabled = false;
  btn.textContent = 'Uruchom analizę →';
  statusBar.style.display = 'none';
}

function copyCard(btn, index) {
  const cards = document.querySelectorAll('.mail-card');
  navigator.clipboard.writeText(cards[index].dataset.full).then(() => {
    btn.textContent = 'Skopiowano ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Kopiuj'; btn.classList.remove('copied'); }, 2000);
  });
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
